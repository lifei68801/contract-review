<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agency Agents Manager</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#252833;--bg4:#2d3140;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --accent:#3b82f6;--accent2:#6366f1;
  --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;
  --radius:10px;--radius-sm:6px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:'JetBrains Mono','Fira Code','Cascadia Code',monospace;
}
html{font-size:14px;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
a{color:var(--accent);text-decoration:none}

/* ── Layout ── */
.app{display:grid;grid-template-columns:260px 1fr;grid-template-rows:56px 1fr;min-height:100vh}
.topbar{grid-column:1/-1;background:var(--bg2);border-bottom:1px solid var(--bg4);display:flex;align-items:center;padding:0 20px;gap:16px;z-index:100}
.sidebar{background:var(--bg2);border-right:1px solid var(--bg4);overflow-y:auto;padding:12px}
.main{overflow-y:auto;padding:20px 28px}

/* ── Topbar ── */
.logo{font-size:1.2rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.logo span{color:var(--accent)}
.topbar-spacer{flex:1}
.active-badge{display:flex;align-items:center;gap:6px;background:var(--bg3);padding:6px 14px;border-radius:20px;font-size:.85rem;cursor:pointer;transition:background .2s}
.active-badge:hover{background:var(--bg4)}
.active-badge .emoji{font-size:1.1rem}
.active-badge .name{color:var(--green);font-weight:600}
.no-active{color:var(--text3);font-size:.85rem}

/* ── Sidebar ── */
.sidebar-title{font-size:.7rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);padding:8px 10px 6px;font-weight:600}
.cat-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:background .15s;font-size:.9rem;margin-bottom:2px}
.cat-item:hover{background:var(--bg3)}
.cat-item.active{background:var(--bg3);color:var(--accent)}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-right:10px}
.cat-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-count{background:var(--bg4);color:var(--text3);font-size:.75rem;padding:2px 7px;border-radius:10px;min-width:24px;text-align:center}

/* ── Search bar ── */
.search-bar{position:relative;margin-bottom:20px}
.search-bar input{width:100%;background:var(--bg2);border:1px solid var(--bg4);color:var(--text);padding:10px 16px 10px 40px;border-radius:var(--radius);font-size:.9rem;outline:none;transition:border-color .2s}
.search-bar input:focus{border-color:var(--accent)}
.search-bar input::placeholder{color:var(--text3)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:1rem}

.controls{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.controls .count{color:var(--text3);font-size:.85rem}
.sort-select{background:var(--bg2);border:1px solid var(--bg4);color:var(--text);padding:6px 12px;border-radius:var(--radius-sm);font-size:.8rem;outline:none;cursor:pointer}

/* ── Cards ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card{background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius);padding:18px;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;position:relative;overflow:hidden}
.card:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:var(--shadow)}
.card-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.card-emoji{font-size:1.8rem;flex-shrink:0;width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:var(--bg3);border-radius:8px}
.card-title{font-size:1rem;font-weight:600;line-height:1.3}
.card-desc{color:var(--text2);font-size:.82rem;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:12px}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.card-cat{font-size:.7rem;padding:3px 10px;border-radius:12px;background:var(--bg3);color:var(--text2);display:flex;align-items:center;gap:4px}
.customized-tag{font-size:.7rem;color:var(--yellow);display:flex;align-items:center;gap:3px}

/* ── Modal / Editor ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bg4);border-radius:12px;width:95vw;max-width:1200px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal-header{display:flex;align-items:center;padding:16px 24px;border-bottom:1px solid var(--bg4);gap:12px;flex-shrink:0}
.modal-header .emoji{font-size:1.6rem}
.modal-header .title{font-size:1.1rem;font-weight:700}
.modal-header .desc{color:var(--text2);font-size:.8rem;margin-left:4px}
.modal-close{margin-left:auto;background:none;border:none;color:var(--text3);font-size:1.4rem;cursor:pointer;padding:4px 8px;border-radius:6px;transition:background .15s}
.modal-close:hover{background:var(--bg3);color:var(--text)}
.modal-body{display:grid;grid-template-columns:1fr 1fr;gap:0;flex:1;overflow:hidden}
.modal-panel{overflow-y:auto;padding:20px 24px}
.modal-panel:first-child{border-right:1px solid var(--bg4)}
.modal-panel h3{font-size:.8rem;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:12px;font-weight:600}
.preview-content{font-size:.85rem;line-height:1.7;color:var(--text2);white-space:pre-wrap;word-wrap:break-word}
.editor-area{width:100%;min-height:100%;background:var(--bg);border:1px solid var(--bg4);color:var(--text);font-family:var(--mono);font-size:.82rem;line-height:1.6;padding:16px;border-radius:var(--radius-sm);resize:none;outline:none;tab-size:2}
.editor-area:focus{border-color:var(--accent)}
.modal-footer{display:flex;align-items:center;gap:12px;padding:14px 24px;border-top:1px solid var(--bg4);flex-shrink:0}
.modal-footer .spacer{flex:1}

/* ── Buttons ── */
.btn{padding:8px 18px;border-radius:var(--radius-sm);border:none;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;font-family:var(--font)}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#2563eb}
.btn-success{background:var(--green);color:#fff}.btn-success:hover{background:#16a34a}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{background:#dc2626}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--bg4)}.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-sm{padding:5px 12px;font-size:.78rem}

/* ── Toast ── */
.toast-container{position:fixed;top:70px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--bg3);border:1px solid var(--bg4);color:var(--text);padding:12px 20px;border-radius:var(--radius);font-size:.85rem;box-shadow:var(--shadow);animation:slideIn .3s ease;max-width:360px}
.toast.success{border-left:3px solid var(--green)}.toast.error{border-left:3px solid var(--red)}.toast.info{border-left:3px solid var(--accent)}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

/* ── Loading ── */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text3);gap:10px}
.spinner{width:24px;height:24px;border:3px solid var(--bg4);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Empty state ── */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty .icon{font-size:3rem;margin-bottom:16px}
.empty h3{color:var(--text2);margin-bottom:8px}

/* ── Responsive ── */
@media(max-width:768px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
  .modal-body{grid-template-columns:1fr}
  .modal{width:100vw;max-width:100vw;max-height:100vh;border-radius:0}
}
</style>
</head>
<body>

<div class="app">
  <!-- Topbar -->
  <div class="topbar">
    <div class="logo"><span>⚡</span> Agency Agents Manager</div>
    <div class="topbar-spacer"></div>
    <div id="activeBadge"></div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-title">Categories</div>
    <div id="categoryList"></div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search agents by name, description, category...">
    </div>
    <div class="controls">
      <span class="count" id="resultCount"></span>
      <select class="sort-select" id="sortSelect">
        <option value="name">Sort by Name</option>
        <option value="category">Sort by Category</option>
      </select>
    </div>
    <div class="grid" id="agentGrid"></div>
  </div>
</div>

<!-- Modal Editor -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="emoji" id="modalEmoji"></span>
      <span class="title" id="modalTitle"></span>
      <span class="desc" id="modalDesc"></span>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-panel">
        <h3>📄 Original Prompt</h3>
        <div class="preview-content" id="modalPreview"></div>
      </div>
      <div class="modal-panel">
        <h3>✏️ Editor</h3>
        <textarea class="editor-area" id="modalEditor" spellcheck="false"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <div class="spacer"></div>
      <button class="btn btn-ghost" id="btnSave" onclick="saveAgent()">💾 Save</button>
      <button class="btn btn-danger" id="btnDeactivate" onclick="deactivateAgent()" style="display:none">↩️ Restore Default</button>
      <button class="btn btn-success" id="btnActivate" onclick="activateAgent()">⚡ Activate</button>
    </div>
  </div>
</div>

<!-- Toasts -->
<div class="toast-container" id="toasts"></div>

<script>
const API = '';
let allAgents = [];
let filteredAgents = [];
let currentCategory = 'all';
let currentAgent = null;
let activeAgentSlug = null;
let categories = [];

// ── Init ──
async function init() {
  await Promise.all([loadAgents(), loadCategories(), loadStatus()]);
  renderSidebar();
  filterAndRender();
}

// ── API calls ──
async function api(path, opts = {}) {
  try {
    const res = await fetch(API + path, { headers: { 'Content-Type': 'application/json' }, ...opts });
    return await res.json();
  } catch (e) {
    toast('Network error: ' + e.message, 'error');
    return { error: e.message };
  }
}

async function loadAgents() {
  const data = await api('/api/agents');
  if (data.error) { allAgents = []; return; }
  allAgents = data.agents || [];
}

async function loadCategories() {
  const data = await api('/api/categories');
  categories = data.categories || [];
}

async function loadStatus() {
  const data = await api('/api/status');
  if (data.active) {
    activeAgentSlug = data.active.slug;
    renderActiveBadge(data.active);
  } else {
    activeAgentSlug = null;
    document.getElementById('activeBadge').innerHTML = '<span class="no-active">No agent active</span>';
  }
}

async function loadAgentDetail(slug) {
  return api('/api/agents/' + encodeURIComponent(slug));
}

// ── Render sidebar ──
function renderSidebar() {
  const el = document.getElementById('categoryList');
  let html = `<div class="cat-item ${currentCategory === 'all' ? 'active' : ''}" onclick="selectCategory('all')">
    <div class="cat-dot" style="background:var(--accent)"></div><div class="cat-name">All Agents</div>
    <div class="cat-count">${allAgents.length}</div></div>`;
  for (const cat of categories) {
    html += `<div class="cat-item ${currentCategory === cat.name ? 'active' : ''}" onclick="selectCategory('${cat.name}')">
      <div class="cat-dot" style="background:${cat.color}"></div><div class="cat-name">${fmtCat(cat.name)}</div>
      <div class="cat-count">${cat.count}</div></div>`;
  }
  el.innerHTML = html;
}

function selectCategory(cat) {
  currentCategory = cat;
  renderSidebar();
  filterAndRender();
}

function fmtCat(name) {
  return name.split('-').map(w => w[0].toUpperCase() + w.slice(1)).join(' ');
}

// ── Filter & render grid ──
function filterAndRender() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  const sort = document.getElementById('sortSelect').value;

  filteredAgents = allAgents.filter(a => {
    if (currentCategory !== 'all' && a.category !== currentCategory) return false;
    if (q) return a.name.toLowerCase().includes(q) || a.description.toLowerCase().includes(q) || a.category.toLowerCase().includes(q);
    return true;
  });

  if (sort === 'name') filteredAgents.sort((a, b) => a.name.localeCompare(b.name));
  else if (sort === 'category') filteredAgents.sort((a, b) => a.category.localeCompare(b.category) || a.name.localeCompare(b.name));

  document.getElementById('resultCount').textContent = `${filteredAgents.length} agent${filteredAgents.length !== 1 ? 's' : ''}`;
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('agentGrid');
  if (filteredAgents.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="icon">🔍</div><h3>No agents found</h3><p>Try adjusting your search or filter</p></div>';
    return;
  }
  grid.innerHTML = filteredAgents.map(a => `
    <div class="card" onclick="openAgent('${esc(a.slug)}')" style="--cat-color:${a.color}">
      <div class="card-header">
        <div class="card-emoji">${a.emoji}</div>
        <div class="card-title">${esc(a.name)}${a.slug === activeAgentSlug ? ' <span style="color:var(--green);font-size:.75rem">● Active</span>' : ''}</div>
      </div>
      <div class="card-desc">${esc(a.description)}</div>
      <div class="card-footer">
        <div class="card-cat"><span class="cat-dot" style="background:${a.color}"></span>${fmtCat(a.category)}</div>
        ${a.customized ? '<div class="customized-tag">✏️ Customized</div>' : ''}
      </div>
    </div>`).join('');
}

function esc(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

// ── Modal ──
async function openAgent(slug) {
  const detail = await loadAgentDetail(slug);
  if (detail.error) { toast(detail.error, 'error'); return; }
  currentAgent = detail;

  document.getElementById('modalEmoji').textContent = detail.emoji;
  document.getElementById('modalTitle').textContent = detail.name;
  document.getElementById('modalDesc').textContent = '— ' + detail.category;
  document.getElementById('modalPreview').textContent = detail.content;
  document.getElementById('modalEditor').value = detail.content;

  document.getElementById('btnActivate').style.display = '';
  document.getElementById('btnDeactivate').style.display = activeAgentSlug ? '' : 'none';

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  currentAgent = null;
}

document.getElementById('modalClose').onclick = closeModal;
document.getElementById('modalOverlay').onclick = e => { if (e.target === e.currentTarget) closeModal(); };
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Actions ──
async function saveAgent() {
  if (!currentAgent) return;
  const content = document.getElementById('modalEditor').value;
  const res = await api('/api/agents/' + encodeURIComponent(currentAgent.slug), {
    method: 'PUT', body: JSON.stringify({ content })
  });
  if (res.error) { toast(res.error, 'error'); return; }
  toast(`Saved: ${currentAgent.name}`, 'success');
  await loadAgents();
  filterAndRender();
  currentAgent.content = content;
  currentAgent.customized = true;
}

async function activateAgent() {
  if (!currentAgent) return;
  const res = await api('/api/agents/' + encodeURIComponent(currentAgent.slug) + '/activate', { method: 'POST' });
  if (res.error) { toast(res.error, 'error'); return; }
  toast(`${res.message}`, 'success');
  activeAgentSlug = currentAgent.slug;
  renderActiveBadge({ name: currentAgent.name, emoji: currentAgent.emoji });
  document.getElementById('btnDeactivate').style.display = '';
  filterAndRender();
}

async function deactivateAgent() {
  const res = await api('/api/agents/deactivate', { method: 'POST' });
  if (res.error) { toast(res.error, 'error'); return; }
  toast(res.message, 'success');
  activeAgentSlug = null;
  document.getElementById('activeBadge').innerHTML = '<span class="no-active">No agent active</span>';
  document.getElementById('btnDeactivate').style.display = 'none';
  filterAndRender();
}

function renderActiveBadge(info) {
  document.getElementById('activeBadge').innerHTML = `<div class="active-badge" onclick="loadStatus()"><span class="emoji">${info.emoji}</span><span class="name">${info.name}</span><span style="color:var(--text3)">● Active</span></div>`;
}

// ── Toast ──
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, 3000);
}

// ── Event listeners ──
document.getElementById('searchInput').addEventListener('input', filterAndRender);
document.getElementById('sortSelect').addEventListener('change', filterAndRender);

// ── Boot ──
init();
</script>
</body>
</html>
