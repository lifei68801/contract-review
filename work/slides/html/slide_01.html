<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聘用意向函</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
        }
    </style>
</head>
<body>
<div style="background: #0B1221; width: 1920px; height: 1080px; position: relative; overflow: hidden; padding: 80px; box-sizing: border-box;">
  <!-- Decorative elements -->
  <!-- Top gradient bar -->
  <div style="position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: linear-gradient(to right, #F59E0B, #EA580C, #10B981, #3B82F6);"></div>
  
  <!-- Decorative circles -->
  <svg style="position: absolute; top: 0; right: 0; width: 500px; height: 500px; pointer-events: none;">
    <defs><radialGradient id="glow1"><stop offset="0%" style="stop-color:#F59E0B;stop-opacity:0.1"/><stop offset="100%" style="stop-color:#F59E0B;stop-opacity:0"/></radialGradient></defs>
    <circle cx="250" cy="250" r="250" fill="url(#glow1)"/>
  </svg>
  
  <!-- Grid pattern -->
  <svg style="position: absolute; bottom: 0; left: 0; width: 600px; height: 400px; pointer-events: none; opacity: 0.04;">
    <defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#4B5563" stroke-width="0.5"/></pattern></defs>
    <rect width="100%" height="100%" fill="url(#grid)"/>
  </svg>
  
  <!-- Main content -->
  <div style="display: flex; flex-direction: column; justify-content: center; height: 100%;">
    <!-- Label -->
    <div style="font-size: 24px; color: #F59E0B; letter-spacing: 6px; margin-bottom: 24px; text-transform: uppercase;">OFFICIAL OFFER LETTER</div>
    
    <!-- Title -->
    <h2 style="font-size: 72px; color: #FFFFFF; margin: 0 0 20px 0; font-weight: 800; line-height: 1.2;">聘用意向函</h2>
    
    <!-- Divider -->
    <div style="width: 120px; height: 4px; background: #F59E0B; margin-bottom: 40px; border-radius: 16px;"></div>
    
    <!-- Company name -->
    <div style="font-size: 36px; color: #FFFFFF; margin-bottom: 48px; font-weight: 600;">北京数势云创科技有限公司</div>
    
    <!-- Info cards row -->
    <div style="display: flex; gap: 24px; margin-bottom: 48px;">
      <!-- Date card -->
      <div style="background: rgba(255,255,255,0.06); backdrop-filter: blur(12px); border-radius: 16px; padding: 32px 41px; border: 1px solid rgba(255,255,255,0.1); min-width: 200px;">
        <div style="font-size: 56px; font-weight: 800; color: #F59E0B; line-height: 1.1;">2020</div>
        <div style="font-size: 18px; color: #94A3B8; margin-top: 8px;">发函年份</div>
      </div>
      <div style="background: rgba(255,255,255,0.06); backdrop-filter: blur(12px); border-radius: 16px; padding: 32px 41px; border: 1px solid rgba(255,255,255,0.1); min-width: 160px;">
        <div style="font-size: 56px; font-weight: 800; color: #EA580C; line-height: 1.1;">10<span style="font-size: 24px; color: #94A3B8;">月</span></div>
        <div style="font-size: 18px; color: #94A3B8; margin-top: 8px;">发函月份</div>
      </div>
      <div style="background: rgba(255,255,255,0.06); backdrop-filter: blur(12px); border-radius: 16px; padding: 32px 41px; border: 1px solid rgba(255,255,255,0.1); min-width: 160px;">
        <div style="font-size: 56px; font-weight: 800; color: #10B981; line-height: 1.1;">26<span style="font-size: 24px; color: #94A3B8;">日</span></div>
        <div style="font-size: 18px; color: #94A3B8; margin-top: 8px;">发函日期</div>
      </div>
    </div>
    
    <!-- Detail text -->
    <div style="font-size: 24px; color: #94A3B8; line-height: 1.8; max-width: 1200px;">
      本聘用意向函由北京数势云创科技有限公司人力资源部正式发出，诚挚邀请李飞先生加入公司。函件详细载明了工作岗位、薪酬福利、股权激励计划、劳动合同期限及入职办理等核心聘用条款，作为双方后续签署正式劳动合同的基础依据。请仔细阅读本函全部内容并于规定期限内回复确认。
    </div>
    
    <!-- Bottom info -->
    <div style="display: flex; gap: 40px; margin-top: 40px;">
      <div style="font-size: 18px; color: #94A3B8;">致：李飞先生</div>
      <div style="font-size: 18px; color: #94A3B8;">函件性质：正式聘用意向沟通</div>
      <div style="font-size: 18px; color: #94A3B8;">联络部门：公司人力资源部</div>
    </div>
  </div>
</div>
</body>
</html>
